services:
  - type: web
    name: lyzn-backend
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    autoDeploy: true
    healthCheckPath: /api/
    envVars:
      - key: ADMIN_PASSWORD
        sync: false
      - key: GMAIL_USER
        sync: false
      - key: GMAIL_APP_PASSWORD
        sync: false
      - key: DISCORD_WEBHOOK_URL
        sync: false
      - key: ADMIN_PANEL_URL
        sync: false
      - key: MONGO_URL
        sync: false
      - key: DB_NAME
        value: lyzn
      - key: CORS_ORIGINS
        value: "*"
